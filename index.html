<!DOCTYPE html>
<html>
<head> 
    <title>Nintendo</title>
    <style>
       
       body {
        font-family: 'Arial', sans-serif;
        background: #f0f0f0;
        color: #eb555a;
        min-height: 100vh;
       }

        .ad-top {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 12px 0;
        }
        
        .ad-top-img {
            width: 700px;
            height: auto;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }
        
        .page-columns {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
        }

        .ad-side {
            width: 230px;
            min-width: 230px;
            position: sticky;
            top: 0;
            height: calc(100vh - 114px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ad-side-img {
            width: 300px;
            height: auto;
            object-fit: contain;
            max-width: 100%;
            max-height: 100%;
            display: block;
        }

        .site-wrapper {
            flex: 1;
            max-width: 870px;
            min-width: 0;
            background: #fff;
        }

        .site-mockup {
            width: 100%;
            height: auto 0;
            display: block;
        }

    </style>
</head>

<body>
   
<div class="ad-top">
    <img src="Banner Ad 1-Better.png" 
    alt="Advertisement 1"
    class="ad-top-img">
</div>

<div class="page-columns">

    <aside class="ad-side left">
        <img src="BannerAdTwo-StraightBorder.png"
        alt="Advertisement 2"
        class="ad-side-img">
    </aside>

    <main class="site-wrapper">
        <img src="Webpage.png"
            alt="Nintendo Site"
            class="site-mockup"
            >   
    </main>

    <aside class="ad-side right">
        <img src="BannerAdThree-Ver6.png" 
        alt="Advertisement 3"
        class="ad-side-img">
    </aside>

</div>

</body>
</html>
